<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uppskattningsväggen LN</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --t1: #2d3561; --t2: #464eb8; --t-bg: #f3f4f8; --t-card: #ffffff; --t-border: #dde1f0; --t-text: #1a1a2e; --t-sub: #5a6080; }
  body { font-family: 'DM Sans', sans-serif; background: #e8eaf2; min-height: 100vh; display: flex; justify-content: center; padding: 32px 16px; }
  #lw { background: var(--t-bg); border-radius: 10px; padding: 24px; width: 100%; max-width: 960px; border: 1px solid var(--t-border); align-self: flex-start; }
  #lw-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  #lw-title-wrap { display: flex; align-items: center; gap: 12px; }
  #lw-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--t2), var(--t1)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 2px 8px rgba(70,78,184,0.3); }
  #lw-title { font-size: 18px; font-weight: 600; color: var(--t-text); }
  #lw-sub { font-size: 12px; color: var(--t-sub); margin: 5px 0 16px 48px; }
  #lw-divider { height: 1px; background: var(--t-border); margin-bottom: 16px; }
  #counter { font-size: 12px; color: var(--t-sub); text-align: right; margin-bottom: 12px; font-weight: 500; }
  #status-bar { font-size: 11px; text-align: center; padding: 6px; margin-bottom: 8px; border-radius: 4px; display: none; }
  #status-bar.loading { display: block; background: #eef0fa; color: var(--t2); }
  #status-bar.error { display: block; background: #fdecea; color: #c0392b; }
  #admin-btn { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; padding: 5px 12px; background: transparent; color: var(--t-sub); border: 1px solid var(--t-border); border-radius: 4px; cursor: pointer; }
  #admin-btn.active { background: #c0392b; color: white; border-color: #c0392b; }
  #admin-modal-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.4); z-index: 999; display: none; align-items: center; justify-content: center; }
  #admin-modal-overlay.show { display: flex; }
  #admin-modal { background: white; border-radius: 8px; padding: 24px; width: 280px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
  #admin-modal h3 { font-size: 15px; font-weight: 600; color: var(--t-text); margin-bottom: 6px; }
  #admin-modal p { font-size: 12px; color: var(--t-sub); margin-bottom: 14px; }
  #pw-input { font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 8px 10px; border: 1px solid #d0d4e8; border-radius: 4px; width: 100%; outline: none; margin-bottom: 8px; }
  #pw-input.error { border-color: #c0392b; }
  #pw-error { font-size: 11px; color: #c0392b; margin-bottom: 10px; display: none; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btn { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; padding: 7px 16px; border: none; border-radius: 4px; cursor: pointer; }
  #modal-cancel { background: var(--t-bg); color: var(--t-sub); }
  #modal-ok { background: var(--t2); color: white; }
  #notes-grid { display: flex; flex-wrap: wrap; gap: 14px; min-height: 160px; align-content: flex-start; }
  .sn-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; animation: sn-in 0.3s cubic-bezier(.2,.8,.4,1.1) both; }
  @keyframes sn-in { from { opacity: 0; transform: translateY(-12px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .sn { width: 170px; min-height: 170px; padding: 15px 14px 13px; border-radius: 3px; position: relative; transform: rotate(var(--rot)); transition: transform 0.2s ease, box-shadow 0.2s ease; display: flex; flex-direction: column; gap: 5px; cursor: default; }
  .sn::before { content: ''; position: absolute; top: -5px; left: 50%; transform: translateX(-50%); width: 20px; height: 11px; background: rgba(0,0,0,0.12); border-radius: 2px; }
  .sn-wrap:hover .sn { transform: rotate(0deg) scale(1.06); box-shadow: 0 8px 28px rgba(45,53,97,0.18); z-index: 10; }
  .sn-wrap:hover .btn-row { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .sn-meta { font-size: 11px; color: rgba(0,0,0,0.35); text-transform: uppercase; letter-spacing: 0.7px; }
  .sn-name { font-size: 17px; font-weight: 600; color: rgba(0,0,0,0.78); line-height: 1.2; margin-bottom: 2px; }
  .sn-line { height: 1px; background: rgba(0,0,0,0.09); margin: 2px 0; }
  .sn-msg { font-family: 'Caveat', cursive; font-size: 17px; color: rgba(0,0,0,0.6); line-height: 1.4; flex: 1; }
  .sn-from-row { display: flex; align-items: baseline; gap: 4px; margin-top: 4px; }
  .sn-from-label { font-size: 11px; color: rgba(0,0,0,0.3); text-transform: uppercase; letter-spacing: 0.5px; }
  .sn-from-name { font-size: 15px; color: rgba(0,0,0,0.48); }
  .btn-row { display: flex; gap: 5px; opacity: 0; transform: translateY(-3px); transition: opacity 0.15s, transform 0.15s; pointer-events: none; z-index: 11; }
  .copy-btn, .del-btn {
    font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; white-space: nowrap;
  }
  .del-btn { background: rgba(192,57,43,0.12); color: #c0392b; display: none; }
  .del-btn:hover { background: #c0392b; color: white; }
  .del-btn.visible { display: block; }
  .heart-container { position: fixed; pointer-events: none; z-index: 9999; top:0; left:0; right:0; bottom:0; overflow: hidden; }
  .fh { position: absolute; animation: fh-up 0.9s cubic-bezier(0.2, 0.8, 0.3, 1) forwards; pointer-events: none; user-select: none; color: var(--t2); }
  @keyframes fh-up {
    0%   { opacity: 1; transform: translateY(0) scale(0.4); }
    30%  { opacity: 1; transform: translateY(-60px) scale(1.3); }
    70%  { opacity: 0.8; transform: translateY(-130px) scale(1.0); }
    100% { opacity: 0; transform: translateY(-220px) scale(0.7); }
  }
  #add-section { background: var(--t-card); border: 1px solid var(--t-border); border-radius: 8px; padding: 16px; margin-top: 20px; }
  #add-title { font-size: 12px; font-weight: 600; color: var(--t-sub); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .field-wrap { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 100px; }
  .field-label { font-size: 11px; font-weight: 600; color: var(--t-sub); }
  input, textarea { font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 7px 10px; border: 1px solid #d0d4e8; border-radius: 4px; background: #fafbff; color: var(--t-text); width: 100%; resize: none; outline: none; transition: border-color 0.15s; }
  input::placeholder, textarea::placeholder { color: #b0b5cc; }
  input:focus, textarea:focus { border-color: var(--t2); box-shadow: 0 0 0 2px rgba(70,78,184,0.12); background: white; }
  .color-row { display: flex; align-items: center; gap: 7px; margin-bottom: 12px; }
  .clabel { font-size: 11px; font-weight: 600; color: var(--t-sub); }
  .cd { width: 22px; height: 22px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; transition: transform 0.12s, border-color 0.12s; }
  .cd:hover { transform: scale(1.2); }
  .cd.sel { border-color: var(--t2); transform: scale(1.1); }
  #post-btn { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; padding: 8px 20px; background: var(--t2); color: white; border: none; border-radius: 4px; cursor: pointer; display: block; margin: 4px 0 0 auto; }
  #post-btn:hover { background: var(--t1); }
  #post-btn:disabled { background: #aab; cursor: not-allowed; }
  #tip { font-size: 11px; color: #aab0cc; margin-top: 10px; text-align: center; }
</style>
</head>
<body>
<div id="lw">
  <div id="lw-header">
    <div id="lw-title-wrap">
      <div id="lw-icon">🌸</div>
      <div id="lw-title">Uppskattningsväggen LN</div>
    </div>
    <button id="admin-btn">⚙ Admin</button>
  </div>
  <div id="lw-sub">Ge en kollega lite extra uppskattning — en lapp i taget.</div>
  <div id="lw-divider"></div>
  <div id="status-bar"></div>
  <div id="counter">Laddar...</div>
  <div id="notes-grid"></div>
  <div id="add-section">
    <div id="add-title">Ny lapp</div>
    <div class="form-row">
      <div class="field-wrap"><span class="field-label">Till</span><input id="inp-to" placeholder="Namn" maxlength="30"/></div>
      <div class="field-wrap"><span class="field-label">Från</span><input id="inp-from" placeholder="Ditt namn" maxlength="30"/></div>
    </div>
    <div class="form-row">
      <div class="field-wrap"><span class="field-label">Meddelande</span><textarea id="inp-msg" placeholder="Skriv något uppmuntrande..." rows="3" maxlength="500"></textarea></div>
    </div>
    <div class="color-row">
      <span class="clabel">Färg</span>
      <div class="cd sel" style="background:#fef3a0;" data-c="#fef3a0" data-s="#dfc830"></div>
      <div class="cd" style="background:#ffd6e0;" data-c="#ffd6e0" data-s="#f0a8b8"></div>
      <div class="cd" style="background:#c8edcc;" data-c="#c8edcc" data-s="#90cc96"></div>
      <div class="cd" style="background:#cce4f8;" data-c="#cce4f8" data-s="#94c4ec"></div>
      <div class="cd" style="background:#e8d4f8;" data-c="#e8d4f8" data-s="#c8a4e8"></div>
      <div class="cd" style="background:#fde0c0;" data-c="#fde0c0" data-s="#f4b870"></div>
    </div>
    <button id="post-btn">Sätt upp lappen</button>
  </div>
  
</div>
<div id="admin-modal-overlay">
  <div id="admin-modal">
    <h3>🔐 Adminläge</h3>
    <p>Ange lösenord för att aktivera borttagning av lappar.</p>
    <input type="password" id="pw-input" placeholder="Lösenord"/>
    <div id="pw-error">Fel lösenord, försök igen.</div>
    <div class="modal-btns">
      <button class="modal-btn" id="modal-cancel">Avbryt</button>
      <button class="modal-btn" id="modal-ok">Logga in</button>
    </div>
  </div>
</div>
<div class="heart-container" id="hc"></div>
<script>
const SUPA_URL = 'https://zaqmhiigfsqvnkqiqqpx.supabase.co';
const SUPA_KEY = 'sb_publishable_J1CcsTv-Mo4O4nKQnI5pbQ_NDXF6DLm';
const ADMIN_PW = 'Papegoja27!';
const ROTS = [-3,-2,-1,0,1,2,3];
const HEARTS = ['♡','♥','❤'];
let selColor = '#fef3a0', selShadow = '#dfc830', adminMode = false;

function rot() { return ROTS[Math.floor(Math.random()*ROTS.length)]; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showStatus(msg, type) { const b = document.getElementById('status-bar'); b.textContent = msg; b.className = type; }
function hideStatus() { document.getElementById('status-bar').className = ''; }

async function api(method, path, body) {
  const res = await fetch(SUPA_URL + '/rest/v1/' + path, {
    method,
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=minimal' : ''
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (method === 'DELETE' || (method === 'POST' && res.status === 201)) return true;
  return res.json();
}

async function loadNotes() {
  showStatus('Laddar lappar...', 'loading');
  try {
    const data = await api('GET', 'lappar?order=id.asc');
    hideStatus();
    const grid = document.getElementById('notes-grid');
    grid.innerHTML = '';
    (Array.isArray(data) ? data : []).forEach((r, i) => {
      const n = { id: r.id, to: r.till||'', from: r.fran||'', msg: r.meddelande||'', c: r.farg||'#fef3a0', sh: r.skugga||'#dfc830', r: r.rotation||0 };
      if (!n.to) return;
      const el = makeNoteWrap(n);
      el.style.animationDelay = (i*0.04)+'s';
      grid.appendChild(el);
    });
    updateCount();
  } catch(e) {
    showStatus('Kunde inte ladda lappar. Försök ladda om sidan.', 'error');
    updateCount();
  }
}

async function saveNote(n) {
  await api('POST', 'lappar', { till: n.to, fran: n.from, meddelande: n.msg, farg: n.c, skugga: n.sh, rotation: n.r });
}

async function deleteNote(id) {
  await api('DELETE', 'lappar?id=eq.' + id);
}

function makeNoteWrap(n) {
  const wrap = document.createElement('div');
  wrap.className = 'sn-wrap';
  const d = document.createElement('div');
  d.className = 'sn';
  d.style.setProperty('--rot', n.r+'deg');
  d.style.background = n.c;
  d.style.boxShadow = `2px 4px 10px rgba(0,0,0,0.09), inset 0 -2px 0 ${n.sh}`;
  d.innerHTML = `<div class="sn-meta">Till</div><div class="sn-name">${esc(n.to)}</div><div class="sn-line"></div><div class="sn-msg">${esc(n.msg)}</div><div class="sn-from-row"><span class="sn-from-label">Från</span><span class="sn-from-name">${esc(n.from)}</span></div>`;
  const btnRow = document.createElement('div');
  btnRow.className = 'btn-row';

  const delBtn = document.createElement('button');
  delBtn.className = 'del-btn' + (adminMode ? ' visible' : '');
  delBtn.textContent = '× Ta bort';
  delBtn.onclick = async e => {
    e.stopPropagation();
    if (!confirm('Ta bort lappen till ' + n.to + '?')) return;
    await deleteNote(n.id);
    wrap.style.cssText = 'opacity:0;transform:scale(0.7);transition:all 0.25s';
    setTimeout(() => { wrap.remove(); updateCount(); }, 250);
  };
  btnRow.appendChild(delBtn);
  let cooldown = false;
  wrap.addEventListener('mouseenter', () => {
    if (cooldown) return; cooldown = true;
    const rb = d.getBoundingClientRect();
    spawnHearts(rb.left + rb.width/2, rb.top + rb.height/3);
    setTimeout(() => { cooldown = false; }, 1400);
  });
  wrap.appendChild(d);
  wrap.appendChild(btnRow);
  return wrap;
}

function setAdminMode(on) {
  adminMode = on;
  const btn = document.getElementById('admin-btn');
  btn.textContent = on ? '🔓 Admin aktiv' : '⚙ Admin';
  btn.classList.toggle('active', on);
  document.querySelectorAll('.del-btn').forEach(b => b.classList.toggle('visible', on));
}

document.getElementById('admin-btn').onclick = () => {
  if (adminMode) { setAdminMode(false); return; }
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').style.display = 'none';
  document.getElementById('pw-input').classList.remove('error');
  document.getElementById('admin-modal-overlay').classList.add('show');
  setTimeout(() => document.getElementById('pw-input').focus(), 100);
};
document.getElementById('modal-cancel').onclick = () => document.getElementById('admin-modal-overlay').classList.remove('show');
function tryLogin() {
  if (document.getElementById('pw-input').value === ADMIN_PW) {
    document.getElementById('admin-modal-overlay').classList.remove('show');
    setAdminMode(true);
  } else {
    document.getElementById('pw-input').classList.add('error');
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
  }
}
document.getElementById('modal-ok').onclick = tryLogin;
document.getElementById('pw-input').onkeydown = e => { if (e.key === 'Enter') tryLogin(); };

function spawnHearts(cx, cy) {
  const hc = document.getElementById('hc');
  for (let i = 0; i < 6; i++) {
    setTimeout(() => {
      const h = document.createElement('span');
      h.className = 'fh';
      h.textContent = HEARTS[Math.floor(Math.random()*3)];
      h.style.left = (cx + (Math.random()-0.5)*70) + 'px';
      h.style.top = cy + 'px';
      h.style.setProperty('--s', ((Math.random()-0.5)*30)+'deg');
      h.style.fontSize = (18 + Math.random()*14) + 'px';
      hc.appendChild(h);
      setTimeout(() => h.remove(), 1200);
    }, i * 70);
  }
}

function updateCount() {
  const n = document.querySelectorAll('.sn-wrap').length;
  document.getElementById('counter').textContent = n + (n===1?' lapp':' lappar');
}

document.querySelectorAll('.cd').forEach(d => {
  d.onclick = () => {
    document.querySelectorAll('.cd').forEach(x => x.classList.remove('sel'));
    d.classList.add('sel');
    selColor = d.dataset.c; selShadow = d.dataset.s;
  };
});

document.getElementById('post-btn').onclick = async () => {
  const to = document.getElementById('inp-to').value.trim();
  const from = document.getElementById('inp-from').value.trim();
  const msg = document.getElementById('inp-msg').value.trim();
  document.getElementById('inp-to').style.borderColor = to ? '' : '#464eb8';
  document.getElementById('inp-from').style.borderColor = from ? '' : '#464eb8';
  document.getElementById('inp-msg').style.borderColor = msg ? '' : '#464eb8';
  if (!to || !from || !msg) return;

  const n = { to, from, msg, c: selColor, sh: selShadow, r: rot() };
  const btn = document.getElementById('post-btn');
  btn.disabled = true; btn.textContent = 'Sparar...';

  try {
    await saveNote(n);
    document.getElementById('notes-grid').appendChild(makeNoteWrap(n));
    updateCount();
    document.getElementById('inp-to').value = '';
    document.getElementById('inp-from').value = '';
    document.getElementById('inp-msg').value = '';
    btn.textContent = 'Lappen är uppe ✓';
    setTimeout(() => { btn.textContent = 'Sätt upp lappen'; btn.disabled = false; }, 1600);
  } catch(e) {
    btn.textContent = 'Fel — försök igen';
    btn.disabled = false;
  }
};

loadNotes();
</script>
</body>
</html>
